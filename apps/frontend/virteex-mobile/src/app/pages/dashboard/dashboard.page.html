<div class="dashboard-container">
  <h1>Dashboard</h1>
  <p>Welcome, User!</p>

  <div *ngIf="errorMessage" class="error-banner">
    {{ errorMessage }}
  </div>

  <ng-container *ngIf="stats$ | async as stats">
    <div class="card">
      <div class="stat-value">{{ stats.pendingApprovals }}</div>
      <div class="stat-label">Pending Approvals</div>
    </div>

    <div class="card">
      <div class="stat-value">{{ stats.openDeals }}</div>
      <div class="stat-label">Active Deals</div>
    </div>

    <div class="card">
      <div class="stat-value">{{ stats.inventoryAlerts }}</div>
      <div class="stat-label">Low Stock Alerts</div>
    </div>
  </ng-container>

  <ng-container *ngIf="!(stats$ | async) && !errorMessage">
    <div class="card">
      <div class="stat-value">...</div>
      <div class="stat-label">Loading stats...</div>
    </div>
  </ng-container>

  <h2>Modules</h2>
  <div class="menu-grid">
    <a routerLink="/approvals" class="menu-item">
      Approvals
    </a>
    <a routerLink="/crm" class="menu-item">
      CRM
    </a>
    <a routerLink="/inventory" class="menu-item">
      Inventory
    </a>
    <a routerLink="/login" class="menu-item" style="background: #dc3545;">
      Logout
    </a>
  </div>
</div>
