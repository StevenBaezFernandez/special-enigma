<div class="flex flex-col items-center justify-center min-h-screen bg-gray-100 p-4">
  <div class="bg-white p-8 rounded shadow-md w-full max-w-sm">
    <div class="flex justify-center mb-6">
      <img src="/assets/logo.png" alt="Virteex Logo" class="h-12">
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label for="email" class="block text-gray-700 text-sm font-bold mb-2">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
          placeholder="user@virteex.com"
        >
        @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
          <p class="text-red-500 text-xs italic mt-1">Valid email is required.</p>
        }
      </div>

      <div class="mb-6">
        <label for="password" class="block text-gray-700 text-sm font-bold mb-2">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline"
          placeholder="********"
        >
        @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <p class="text-red-500 text-xs italic mt-1">Password is required.</p>
        }
      </div>

      <div class="flex items-center justify-between">
        <button
          type="submit"
          [disabled]="loginForm.invalid || isLoading"
          class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full disabled:opacity-50"
        >
          {{ isLoading ? 'Logging in...' : 'Sign In' }}
        </button>
      </div>

      @if (errorMessage) {
        <p class="text-red-500 text-xs italic mt-4 text-center">{{ errorMessage }}</p>
      }
    </form>
  </div>
</div>
