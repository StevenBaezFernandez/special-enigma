<div class="social-login-container">
  <!-- Google -->
  <button (click)="loginWith('google')" class="social-btn" [attr.aria-label]="'LOGIN.CONTINUE_WITH' | translate: { provider: 'Google' }" title="{{ 'LOGIN.CONTINUE_WITH' | translate: { provider: 'Google' } }}">
     <img src="assets/icons/google.svg" alt="Google" class="social-icon">
  </button>

  <!-- Microsoft -->
  <button (click)="loginWith('microsoft')" class="social-btn" [attr.aria-label]="'LOGIN.CONTINUE_WITH' | translate: { provider: 'Microsoft' }" title="{{ 'LOGIN.CONTINUE_WITH' | translate: { provider: 'Microsoft' } }}">
    <img src="assets/icons/microsoft.svg" alt="Microsoft" class="social-icon">
  </button>

  <!-- Okta -->
  <button (click)="loginWith('okta')" class="social-btn" [attr.aria-label]="'LOGIN.CONTINUE_WITH' | translate: { provider: 'Okta' }" title="{{ 'LOGIN.CONTINUE_WITH' | translate: { provider: 'Okta' } }}">
     <img src="assets/icons/okta.svg" alt="Okta" class="social-icon">
  </button>

  <!-- Passkey -->
  <button (click)="loginWith('passkey')" class="social-btn" [attr.aria-label]="'LOGIN.PASSKEY_BUTTON' | translate" title="{{ 'LOGIN.PASSKEY_BUTTON' | translate }}">
    <img src="assets/icons/passkey.svg" alt="Passkey" class="social-icon">
  </button>
</div>
