<div class="auth-page">
  <div class="auth-card mica">
    <div class="auth-header">
      <div class="auth-logo"></div>
      <h2 class="auth-title">Iniciar Sesión</h2>
      <p class="auth-subtitle">Accede a tu cuenta de Virteex</p>
    </div>

    @if (!mfaRequired) {
    <div class="auth-body">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
        <virteex-input
          formControlName="email"
          label="Correo electrónico o teléfono"
          type="text"
          [error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched ? 'Requerido' : ''"
        ></virteex-input>

        <virteex-input
          formControlName="password"
          label="Contraseña"
          type="password"
          [error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched ? 'Requerido' : ''"
        ></virteex-input>

        <div class="auth-options">
          <label class="auth-checkbox">
            <input id="remember_me" name="remember_me" type="checkbox" />
            <span>Recordarme</span>
          </label>
          <a
            [routerLink]="['/', lang, country.toLowerCase(), 'auth', 'forgot-password']"
            class="auth-link"
          >
            ¿Olvidaste tu contraseña?
          </a>
        </div>

        <div class="auth-actions">
          <virteex-button type="submit" [loading]="loading" class="w-full">
            Iniciar Sesión
          </virteex-button>
        </div>
      </form>

      <div class="auth-divider">
        <span>¿No tienes cuenta?</span>
      </div>

      <div class="auth-footer">
        <a
          [routerLink]="['/', lang, country.toLowerCase(), 'auth', 'register']"
          class="auth-link auth-link--prominent"
        >
          Regístrate aquí
        </a>
      </div>
    </div>
    }

    @if (mfaRequired) {
    <div class="auth-body">
      <form [formGroup]="mfaForm" (ngSubmit)="onMfaSubmit()" class="auth-form">
        <div class="auth-instruction">
          <h3 class="auth-instruction-title">Verificación de Identidad</h3>
          <p class="auth-instruction-text">Ingresa el código enviado a tu dispositivo.</p>
        </div>

        <virteex-input
          formControlName="code"
          label="Código de verificación"
          type="text"
          [error]="mfaForm.get('code')?.invalid && mfaForm.get('code')?.touched ? 'Código requerido (6 dígitos)' : ''"
        ></virteex-input>

        <div class="auth-actions">
          <virteex-button type="submit" [loading]="loading" class="w-full">
            Verificar
          </virteex-button>
        </div>
      </form>
    </div>
    }

    @if (errorMsg) {
    <div class="auth-error">
      {{ errorMsg }}
    </div>
    }
  </div>
</div>
