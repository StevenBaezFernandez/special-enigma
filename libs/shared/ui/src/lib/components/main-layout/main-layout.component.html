<div class="shell">
  <!-- Sidebar -->
  <aside
    class="shell__sidebar mica"
    [class.shell__sidebar--collapsed]="!isSidebarOpen"
  >
    <div class="shell__logo">
      <div class="shell__logo-icon"></div>
      <span class="shell__logo-text">Virteex ERP</span>
    </div>

    <nav class="shell__nav">
      <ul class="shell__nav-list">
        <li class="shell__nav-item">
          <a routerLink="/" class="shell__nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
            <i class="shell__nav-icon home-icon"></i>
            <span class="shell__nav-label">Home</span>
          </a>
        </li>

        <li class="shell__nav-separator"></li>

        <li class="shell__nav-item" *ngFor="let item of navItems">
          <a [routerLink]="item.path" class="shell__nav-link" routerLinkActive="active">
            <i class="shell__nav-icon" [class]="item.icon"></i>
            <span class="shell__nav-label">{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </nav>

    <div class="shell__footer">
      <a routerLink="/auth/login" class="shell__logout">
        <i class="shell__nav-icon logout-icon"></i>
        <span class="shell__nav-label">Logout</span>
      </a>
    </div>
  </aside>

  <!-- Main Area -->
  <div class="shell__main">
    <header class="shell__header mica">
      <div class="shell__header-left">
        <button (click)="toggleSidebar()" class="shell__toggle" aria-label="Toggle Sidebar">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor">
            <path d="M2 4H14M2 8H14M2 12H14" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <h1 class="shell__title">Dashboard</h1>
      </div>

      <div class="shell__header-right">
        <virteex-theme-toggle></virteex-theme-toggle>
        <div class="shell__user-profile">
          <div class="shell__avatar">JD</div>
          <div class="shell__user-info">
            <span class="shell__username">John Doe</span>
            <span class="shell__user-role">Administrator</span>
          </div>
        </div>
      </div>
    </header>

    <main class="shell__content">
      <div class="shell__page-wrapper">
        <router-outlet></router-outlet>
      </div>
    </main>

    <!-- Enhanced Footer -->
    <footer class="shell__main-footer mica">
      <div class="footer-left">
        <div class="language-selector-wrapper">
          <select [ngModel]="languageService.currentLang()" (ngModelChange)="languageService.setLanguage($event)" class="lang-select">
            <option value="es">Español</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>
      <div class="footer-center">
        <nav class="footer-nav">
          <a routerLink="/terms" class="footer-link">Términos</a>
          <a routerLink="/privacy" class="footer-link">Privacidad</a>
          <a routerLink="/security" class="footer-link">Seguridad</a>
          <a routerLink="/contact" class="footer-link">Contacto</a>
        </nav>
      </div>
      <div class="footer-right">
        <span class="copyright">&copy; {{ currentYear }} Virteex. Todos los derechos reservados.</span>
      </div>
    </footer>
  </div>
</div>
