<button class="theme-toggle-button" (click)="themeService.toggleTheme()"
    [attr.data-tooltip]="tooltips[themeService.theme()]">

    @switch (themeService.theme()) {
    @case ('light') {
    <lucide-icon [img]="SunIcon" size="18"></lucide-icon>
    }
    @case ('dark') {
    <lucide-icon [img]="MoonIcon" size="18"></lucide-icon>
    }
    @case ('system') {
    <lucide-icon [img]="MonitorIcon" size="18"></lucide-icon>
    }
    }

</button>
