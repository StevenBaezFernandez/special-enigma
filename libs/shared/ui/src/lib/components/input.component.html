<div class="input-container">
  <label *ngIf="label" class="input-label">{{ label }}</label>
  <div class="input-wrapper">
    <input
      [type]="type"
      [placeholder]="placeholder"
      [value]="value"
      [disabled]="disabled"
      (input)="onInput($event)"
      (blur)="onTouched()"
      class="input-field"
      [class.input-field--error]="!!error"
    />
  </div>
  <span *ngIf="error" class="input-error-msg">{{ error }}</span>
</div>
