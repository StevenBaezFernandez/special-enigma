<div class="p-6">
  <h1 class="text-2xl font-bold mb-4">Inventory Dashboard</h1>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
    <!-- KPI Card -->
    <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200">
      <h3 class="text-gray-500 text-sm font-medium uppercase">Total Warehouses</h3>
      <p class="text-3xl font-bold text-gray-900 mt-2">{{ totalWarehouses() }}</p>
    </div>
    <!-- Placeholder for Stock Value -->
    <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200 opacity-50">
      <h3 class="text-gray-500 text-sm font-medium uppercase">Total Stock Value</h3>
      <p class="text-3xl font-bold text-gray-900 mt-2">$ --</p>
      <span class="text-xs text-gray-400">Coming soon (BI Module)</span>
    </div>
    <!-- Placeholder for Active Movements -->
     <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200 opacity-50">
      <h3 class="text-gray-500 text-sm font-medium uppercase">Active Movements</h3>
      <p class="text-3xl font-bold text-gray-900 mt-2">--</p>
      <span class="text-xs text-gray-400">Coming soon</span>
    </div>
  </div>

  <h2 class="text-xl font-semibold mb-4">Active Warehouses</h2>
  <div class="bg-white shadow overflow-hidden sm:rounded-md">
    <ul class="divide-y divide-gray-200">
      <li *ngFor="let w of warehouses()">
        <div class="px-4 py-4 sm:px-6">
          <div class="flex items-center justify-between">
            <p class="text-sm font-medium text-indigo-600 truncate">{{ w.name }}</p>
            <div class="ml-2 flex-shrink-0 flex">
              <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">
                Active
              </span>
            </div>
          </div>
          <div class="mt-2 sm:flex sm:justify-between">
            <div class="sm:flex">
              <p class="flex items-center text-sm text-gray-500">
                Code: {{ w.code }}
              </p>
            </div>
             <div class="mt-2 flex items-center text-sm text-gray-500 sm:mt-0">
               <p>Location: {{ w.location }}</p>
            </div>
          </div>
        </div>
      </li>
      <li *ngIf="warehouses().length === 0" class="px-4 py-4 text-gray-500 text-center">
        No warehouses found.
      </li>
    </ul>
  </div>
</div>
