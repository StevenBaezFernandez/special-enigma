<div class="marketplace-container">
  <h1>Plugin Marketplace</h1>
  <p>Discover and install powerful plugins to extend your workspace.</p>

  <div class="plugin-grid">
    <div class="plugin-card" *ngFor="let plugin of plugins">
      <div class="header">
          <h3>{{ plugin.name }}</h3>
          <span class="badge" *ngIf="plugin.installed">Installed</span>
      </div>
      <p>{{ plugin.description }}</p>
      <div class="meta">
        <span>v{{ plugin.version }}</span>
        <span>By {{ plugin.author }}</span>
      </div>
      <button
        (click)="install(plugin.id)"
        [disabled]="plugin.installed || plugin.status === 'installing'"
        [class.installed]="plugin.installed"
        [class.installing]="plugin.status === 'installing'">
        {{ plugin.status === 'installing' ? 'Installing...' : (plugin.installed ? 'Active' : 'Install') }}
      </button>
    </div>
  </div>
</div>
