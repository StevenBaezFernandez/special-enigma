<div class="page-container">
  <div class="page-header">
    <h1>{{ 'INVOICE.NEW_TITLE' | translate }}</h1>
    <div class="page-header-actions">
      <button class="btn" [routerLink]="['/app/invoices']">{{ 'INVOICE.CANCEL' | translate }}</button>
      <button class="btn btn-primary" (click)="onSubmit()">
        {{ 'INVOICE.SAVE' | translate }}
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <form [formGroup]="invoiceForm">
        <div class="form-row">
          <div class="form-col">
            <label class="form-label">{{ 'INVOICE.CLIENT' | translate }}</label>
            <select formControlName="customerId" class="form-control" (change)="onCustomerChange()">
              <option value="" disabled>{{ 'INVOICE.SELECT_CLIENT' | translate }}</option>
              <option *ngFor="let client of customers" [value]="client.id">
                {{ client.companyName }}
              </option>
            </select>
          </div>
          <div class="form-col">
            <label class="form-label">{{ 'INVOICE.ISSUE_DATE' | translate }}</label>
            <input
              type="date"
              formControlName="issueDate"
              class="form-control"
            />
          </div>
          <div class="form-col">
            <label class="form-label">{{ 'INVOICE.DUE_DATE' | translate }}</label>
            <input
              type="date"
              formControlName="dueDate"
              class="form-control"
            />
          </div>
        </div>

        <!-- Conditional Fields for MX -->
        <div class="form-row" *ngIf="isMexicanCustomer">
          <div class="form-col">
            <label class="form-label">{{ 'INVOICE.PAYMENT_FORM' | translate }}</label>
            <select formControlName="paymentForm" class="form-control">
               <option *ngFor="let pf of paymentForms" [value]="pf.code">{{ pf.name }}</option>
            </select>
          </div>
          <div class="form-col">
            <label class="form-label">{{ 'INVOICE.PAYMENT_METHOD' | translate }}</label>
            <select formControlName="paymentMethod" class="form-control">
               <option *ngFor="let pm of paymentMethods" [value]="pm.code">{{ pm.name }}</option>
            </select>
          </div>
          <div class="form-col">
            <label class="form-label">{{ 'INVOICE.USAGE' | translate }}</label>
             <select formControlName="usage" class="form-control">
               <option *ngFor="let u of cfdiUsages" [value]="u.code">{{ u.name }}</option>
            </select>
          </div>
        </div>

        <div formArrayName="lineItems">
          <div
            *ngFor="let item of lineItems.controls; let i = index"
            [formGroupName]="i"
            class="line-item"
          >
            <select
              formControlName="productId"
              (change)="onProductSelect(i)"
              class="form-control"
            >
              <option value="" disabled>{{ 'INVOICE.SELECT_PRODUCT' | translate }}</option>
              <option *ngFor="let product of products" [value]="product.id">
                {{ product.name }}
              </option>
            </select>
            <input
              type="number"
              formControlName="quantity"
              class="form-control"
              placeholder="{{ 'INVOICE.QUANTITY' | translate }}"
            />
            <input
              type="number"
              formControlName="price"
              class="form-control"
              placeholder="{{ 'INVOICE.PRICE' | translate }}"
            />
             <input
              type="number"
              formControlName="taxRate"
              class="form-control"
              placeholder="{{ 'INVOICE.TAX_RATE' | translate }}"
              step="0.01"
            />
            <div *ngIf="!validateStock(i)" class="text-danger">
                {{ 'INVOICE.STOCK_ERROR' | translate }}
            </div>
            <button
              type="button"
              class="btn-icon"
              (click)="removeLineItem(i)"
            >
              X
            </button>
          </div>
        </div>
        <button type="button" class="btn" (click)="addLineItem()">
          {{ 'INVOICE.ADD_LINE' | translate }}
        </button>

        <div class="totals-section">
            <div class="total-row">
                <span>{{ 'INVOICE.SUBTOTAL' | translate }}:</span>
                <span>{{ totals.subtotal | number:'1.2-2' }}</span>
            </div>
            <div class="total-row">
                <span>{{ 'INVOICE.TAXES' | translate }}:</span>
                <span>{{ totals.tax | number:'1.2-2' }}</span>
            </div>
            <div class="total-row total-final">
                <span>{{ 'INVOICE.TOTAL' | translate }}:</span>
                <span>{{ totals.total | number:'1.2-2' }}</span>
            </div>
        </div>

        <div class="form-group">
          <label class="form-label">{{ 'INVOICE.NOTES' | translate }}</label>
          <textarea formControlName="notes" class="form-control"></textarea>
        </div>
      </form>
    </div>
  </div>
</div>
