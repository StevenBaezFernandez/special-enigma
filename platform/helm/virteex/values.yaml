global:
  env: production

applications:
  # Maintain gateway during migration
  gateway:
    image: virteex/gateway:latest
    replicas: 3
    pdb:
      maxUnavailable: 1

  # New BFFs
  bff-portal:
    image: virteex/bff-portal:latest
    replicas: 2
  bff-pos:
    image: virteex/bff-pos:latest
    replicas: 2
  bff-wms:
    image: virteex/bff-wms:latest
    replicas: 2

  identity:
    image: virteex/identity:latest
    replicas: 3
    pdb:
      maxUnavailable: 1
  billing:
    image: virteex/billing:latest
    replicas: 3
    pdb:
      maxUnavailable: 1
  notification:
    image: virteex/notification:latest
    replicas: 2
    pdb:
      maxUnavailable: 1
  fiscal:
    image: virteex/fiscal:latest
    replicas: 2
    pdb:
      maxUnavailable: 1
