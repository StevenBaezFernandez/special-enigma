{{- range $name, $config := .Values.applications }}
{{- $replicas := ($config.replicas | default 2) }}
{{- $maxUnavailable := ($config.pdb.maxUnavailable | default 1) }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app: {{ $name }}
spec:
  replicas: {{ $replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
        topology.virteex.io/service: {{ $name }}
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: [{{ $name | quote }}]
              topologyKey: topology.kubernetes.io/zone
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: {{ $name }}
      containers:
        - name: {{ $name }}
          image: {{ $config.image }}
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: {{ $config.resources.requests.cpu | default "200m" }}
              memory: {{ $config.resources.requests.memory | default "256Mi" }}
            limits:
              cpu: {{ $config.resources.limits.cpu | default "1" }}
              memory: {{ $config.resources.limits.memory | default "1Gi" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
spec:
  selector:
    app: {{ $name }}
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}-pdb
spec:
  maxUnavailable: {{ $maxUnavailable }}
  selector:
    matchLabels:
      app: {{ $name }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $name }}
  minReplicas: {{ $config.hpa.minReplicas | default 2 }}
  maxReplicas: {{ $config.hpa.maxReplicas | default 10 }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $config.hpa.targetCPUUtilizationPercentage | default 70 }}
{{- end }}
