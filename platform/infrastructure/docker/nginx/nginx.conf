events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    gzip on;
    gzip_types text/plain application/xml text/css application/javascript application/json;

    # Upstreams
    upstream bff_portal { server bff-portal:3000; }
    upstream bff_pos { server bff-pos:3000; }
    upstream bff_wms { server bff-wms:3000; }
    upstream gateway { server gateway:3000; }
    upstream api_gateway { server api-gateway:3000; }

    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;
        ssl_certificate /etc/nginx/certs/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/certs/nginx-selfsigned.key;

        # NEW BFF ROUTES (Phased Migration)
        location /portal/ {
            proxy_pass http://bff_portal/api/;
            proxy_set_header Host $host;
        }

        location /pos/ {
            proxy_pass http://bff_pos/api/;
            proxy_set_header Host $host;
        }

        location /wms/ {
            proxy_pass http://bff_wms/api/;
            proxy_set_header Host $host;
        }

        # LEGACY ROUTES (Still active until fully migrated)
        location /api/ {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
        }

        location /graphql {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
        }
    }
}
