name: CI/CD Pipeline

on:
  push:
    branches: [main, 'release/*']
    paths-ignore:
      - '**.md'
      - '**.txt'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '**.txt'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run governance:consistency
      - run: npm run arch:validate-tags
      - run: npm run arch:validate-naming
      - run: npm run arch:check
      - run: npx nx affected --target=lint --base=origin/main --head=HEAD

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx tsc -p tsconfig.base.json --noEmit

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run test:validate-backend
      - run: npm run quality:e2e-coverage
      - run: npx nx affected --target=test --base=origin/main --head=HEAD --exclude='*-e2e'

  integration:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx nx affected --target=build --base=origin/main --head=HEAD

  readiness-gates:
    runs-on: ubuntu-latest
    needs: [integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Enforcement: Block Simulations
        run: ./tools/quality-gates/block-simulations.sh
      - name: Enforcement: Verify RLS Real Data Isolation
        run: node ./tools/quality-gates/check-rls.js
      - run: npm run readiness:commercial
      - run: npm run quality:docs
      - run: npm run quality:plugin-isolation
      - run: npm run readiness:check

  security:
    runs-on: ubuntu-latest
    needs: [integration]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run security:sbom
      - name: Verify SBOM artifact exists
        run: test -s sbom.json
      - run: ./tools/readiness/validate-signing-readiness.sh
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.7.0
      - name: Prepare signing key material
        run: |
          if [ -n "${{ secrets.COSIGN_PRIVATE_KEY }}" ]; then
            printf '%s' "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key
          else
            echo "FATAL: COSIGN_PRIVATE_KEY secret is missing. Signing is mandatory for release."
            exit 1
          fi
      - run: npm run security:sign
      - run: npm run security:verify
      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: sbom.json
      - uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          ignore-unfixed: true
          format: table
          exit-code: '1'

  release-evidence:
    runs-on: ubuntu-latest
    needs: [readiness-gates, security]
    if: startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run readiness:evidence
      - run: npm run readiness:report
      - run: ./tools/run-pocs.sh artifacts/poc-results
      - name: Upload release evidence pack
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-${{ github.run_id }}
          path: |
            evidence/releases
            evidence/reports/RELEASE_READINESS_REPORT.md
